name: Build (Windows)

on:
  push:
    branches: [ "master", "main", "sow/**" ]
  pull_request:
    branches: [ "master", "main", "sow/**" ]
  workflow_dispatch:

jobs:
  build:
    # Guard: if this workflow ever gets merged upstream (e.g. HoareLea),
    # it will show as "skipped" there and won't break their CI.
    if: github.repository_owner == 'SAM-BIM'
    runs-on: windows-2022

    env:
      MSBUILDDISABLENODEREUSE: "1"
      ORG_NAME: "SAM-BIM"
      # >>> CHANGE THIS PER REPO <<<
      # Examples: SAM, SAM_gbXML, SAM_GEM, SAM_Tas, ...
      REPO_NAME: "SAM_Windows"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ env.REPO_NAME }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Compute SAMVersion
        id: ver
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Prefer head_ref when its a sow branch (release-promotion PRs from sow/* to main),
          # else use base_ref on PR events / ref_name on push events.
          $headRef = '${{ github.head_ref }}'
          $baseRef = '${{ github.base_ref }}'
          $refName = '${{ github.ref_name }}'
          if ($headRef -match '^sow/\d{4}-Q\d$') {
            $ref = $headRef
          } elseif ('${{ github.event_name }}' -eq 'pull_request') {
            $ref = $baseRef
          } else {
            $ref = $refName
          }
          # .NET AssemblyVersion components are UInt16 (max 65535). Cap to 60000 for headroom.
          $run = ${{ github.run_number }} % 60000
          if ($ref -match 'sow/(\d{4})-Q(\d)') {
            $v = "$($Matches[1]).$($Matches[2]).$run.0"
            $src = "branch '$ref'"
          } else {
            $now = (Get-Date).ToUniversalTime()
            $quarter = [int][Math]::Ceiling($now.Month / 3.0)
            $v = "$($now.Year).$quarter.$run.0"
            $src = "date $($now.ToString('yyyy-MM-dd')) (ref '$ref' not sow/yyyy-Qx)"
          }
          Write-Host "SAMVersion = $v (from $src)"
          "samversion=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Clone dependency repos (siblings)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $org  = '${{ env.ORG_NAME }}'
          $repo = '${{ env.REPO_NAME }}'

          # >>> ADJUST BUILD ORDER HERE IF NEEDED <<<
          # Keep the current repo LAST.
          $buildOrder = @(
            'SAM'
            $repo
          )

          # Clone everything except the last one (already checked out by Actions)
          $deps = $buildOrder[0..($buildOrder.Count-2)]
          foreach ($r in $deps) {
            if (Test-Path $r) { continue }
            $headRef = '${{ github.head_ref }}'
            $baseRef = '${{ github.base_ref }}'
            $refName = '${{ github.ref_name }}'
            $candidates = @()
            if ($headRef) { $candidates += $headRef }
            # Current sow branch: base_ref on PR events, ref_name on push events.
            $sowRef = if ($baseRef -match '^sow/') { $baseRef } elseif ($refName -match '^sow/') { $refName } else { '' }
            if ($sowRef -and $sowRef -ne $headRef) { $candidates += $sowRef }
            $candidates += 'sow/2026-Q2'
            $cloned = $false
            foreach ($cand in $candidates) {
              $has = (git ls-remote --heads "https://github.com/$org/$r.git" $cand 2>$null | Out-String).Trim()
              if ($has) {
                Write-Host "Cloning $org/$r @ $cand"
                git clone --depth 1 --branch $cand "https://github.com/$org/$r.git" $r
                $cloned = $true
                break
              }
            }
            if (-not $cloned) {
              Write-Host "Cloning $org/$r @ default branch"
              git clone --depth 1 "https://github.com/$org/$r.git" $r
            }
          }


          # Ensure ReferencePath exists even before SAM_Windows builds
          New-Item -ItemType Directory -Force -Path "SAM_Windows\build" | Out-Null

      - name: Restore + Rebuild in order (CI props like SAM_Deploy)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $repo = '${{ env.REPO_NAME }}'
          $windowsRef = (Resolve-Path 'SAM_Windows\build').Path

          # IMPORTANT: keep these as an ARRAY of args (do NOT join into one string)
          $common = @(
            '/m:1'
            '/nr:false'
            '/v:m'
            '/p:Configuration=Release'
            '/p:UseSharedCompilation=false'
            '/p:SAMVersion=${{ steps.ver.outputs.samversion }}'
            '/p:RunPostBuildEvent=OnOutputUpdated'
            "/p:ReferencePath=$windowsRef"
          )

          # If you really want Platform, use QUOTED Any CPU:
          # $common += '/p:Platform="Any CPU"'

          # Same build order as above (keep repo LAST)
          $buildOrder = @(
            'SAM'
            $repo
          )

          # Convert build order -> solution paths (robust: first .sln in each folder)
          $solutions = foreach ($r in $buildOrder) {
            $sln = Get-ChildItem -Path $r -Filter *.sln -File | Select-Object -First 1
            if (-not $sln) { throw "No .sln found under: $r" }
            $sln.FullName
          }

          foreach ($sln in $solutions) {
            Write-Host "==> Restore: $sln"
            & msbuild $sln /t:Restore @common
          }

          foreach ($sln in $solutions) {
            Write-Host "==> Rebuild: $sln"
            & msbuild $sln /t:Rebuild @common
          }

      - name: Upload build folders (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-build-folders
          path: |
            **\build\*
          if-no-files-found: warn
